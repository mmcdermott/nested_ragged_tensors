name: Benchmark Performance
on:
  push:
    branches: [main]
  pull_request:
    branches: [main, "release/*", "dev"]

jobs:
  benchmark:
    permissions: write-all
    name: Run benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup package
        uses: ./.github/actions/setup
        with:
          python-version: "3.12"
          group: "benchmarks"

      - name: Install sample dataset builder
        run: uv pip install sample_dataset_builder/

      - name: Run end-to-end benchmark
        run: |
          uv run pytest benchmark/run.py

      - name: Run micro-benchmarks
        run: |
          uv run pytest benchmark/test_micro.py

      - name: Merge benchmark outputs
        run: |
          uv run python -c "
          import json
          from pathlib import Path
          out_dir = Path('benchmark/outputs')
          merged = []
          for f in sorted(out_dir.glob('*.json')):
              if f.name == 'combined.json':
                  continue
              merged.extend(json.loads(f.read_text()))
          (out_dir / 'combined.json').write_text(json.dumps(merged))
          "

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Benchmark
          tool: "customSmallerIsBetter"
          output-file-path: benchmark/outputs/combined.json
          # Use personal access token instead of GITHUB_TOKEN due to https://github.community/t/github-action-not-triggering-gh-pages-upon-push/16096
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          # Show alert with commit comment on detecting possible performance regression
          alert-threshold: "150%"
          comment-on-alert: true
          fail-on-alert: false
